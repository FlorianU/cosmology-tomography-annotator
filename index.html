<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmological 2D Tomography Annotator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="sidebar">
      <h2>Participant Info</h2>
      <div class="control-group">
        <label for="inputParticipantID" style="font-size: 12px; color: #ccc">Participant ID:</label>
        <input type="text" id="inputParticipantID" class="config-input" placeholder="e.g., P01" />
      </div>
      <h2>Dataset Config</h2>
      <div class="control-group">
        <label for="inputTotalSlices" style="font-size: 12px; color: #ccc">Amount of Slices:</label>
        <input type="number" id="inputTotalSlices" class="config-input" value="50" min="1" max="5000" />
      </div>

      <h2>Viewing Axis</h2>
      <div class="control-group radio-container">
        <label><input type="radio" name="axisGroup" value="Z" checked /> 
          <span class="color-box" style="background: #fff"></span> Z-Axis (Draw)</label>
        <label><input type="radio" name="axisGroup" value="Y" /> 
          <span class="color-box" style="background: #888"></span> Y-Axis (View Only)</label>
      </div>

      <h2>Rendering Options</h2>
      <div class="control-group">
        <label for="inputShineDepth" style="font-size: 12px; color: #ccc">Shine-Through Depth (Slices):</label>
        <input type="number" id="inputShineDepth" class="config-input" value="3" min="0" max="15" />
      </div>

      <h2>Task Controls</h2>
      <div class="control-group">
        <button id="btnStart" disabled>LOADING IMAGES...</button>
        <button id="btnToggleAnnotations" disabled style="background-color: #555;">HIDE ANNOTATIONS</button>
        <button id="btnFinish" disabled>FINISH & EXPORT</button>
        <button id="btnRestart" disabled>RESTART TASK</button>
      </div>

      <h2>Structure Labels</h2>
      <div class="control-group radio-container">
        <label><input type="radio" name="labelGroup" value="#ff3333" checked />
          <span class="color-box" style="background: #ff3333"></span> Cluster</label>
        <label><input type="radio" name="labelGroup" value="#3399ff" />
          <span class="color-box" style="background: #3399ff"></span> Filament</label>
        <label><input type="radio" name="labelGroup" value="#33cc33" />
          <span class="color-box" style="background: #33cc33"></span> Void</label>
        <label><input type="radio" name="labelGroup" value="eraser" />
          <span class="color-box eraser-box"></span> Eraser</label>
      </div>

      <h2>Brush Size</h2>
      <div class="control-group">
        <input type="range" id="brushSize" min="1" max="50" value="10" style="width: 100%" />
        <p style="font-size: 11px; color: #888; margin-top: 10px;"><b>Scroll:</b> Zoom In/Out<br><b>Mid-Click:</b> Pan</p>
      </div>
    </div>

    <div id="workspace">
      <div id="overlay">
        <div id="overlay-text">Loading Dataset...</div>
        <div id="overlay-subtext">Please wait while images are cached to memory.</div>
      </div>
      
      <div id="view-only-banner">Y-AXIS: REFERENCE VIEW ONLY (DRAWING DISABLED)</div>

      <div id="canvas-container">
        <div id="zoom-wrapper">
          <canvas id="bgCanvas" width="1046" height="952"></canvas>
          <canvas id="fgCanvas" width="1046" height="952"></canvas>
        </div>

        <div id="minimap-container">
          <div id="reference-cube">
            <div class="cube-face front">Z</div>
            <div class="cube-face back"></div>
            <div class="cube-face left">X</div>
            <div class="cube-face right"></div>
            <div class="cube-face top">Y</div>
            <div class="cube-face bottom"></div>
            <div id="moving-slice"></div> 
          </div>
        </div>
      </div>

      <div id="footer">
        <button id="btnPrevSlice" class="nav-btn" disabled>&#9664; PREV</button>
        <input type="range" id="sliceSlider" min="0" max="99" value="0" disabled />
        <button id="btnNextSlice" class="nav-btn" disabled>NEXT &#9654;</button>
        <div id="sliceLabel">Z: 000</div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
