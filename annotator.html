<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmological 2D Tomography Annotator</title>
    <style>
      /* UI Styling - Dark Mode, utilitarian aesthetic */
      body {
        margin: 0;
        padding: 0;
        background-color: #121212;
        color: #e0e0e0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      #sidebar {
        width: 250px;
        background-color: #1e1e1e;
        padding: 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        border-right: 1px solid #333;
        overflow-y: auto;
        z-index: 20;
      }
      h2 {
        font-size: 14px;
        margin-top: 0;
        color: #aaa;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-bottom: 1px solid #333;
        padding-bottom: 5px;
      }

      /* Controls */
      .control-group {
        margin-bottom: 25px;
      }
      button {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border: none;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
      }
      #btnStart {
        background-color: #2e7d32;
        color: white;
      }
      #btnStart:hover {
        background-color: #1b5e20;
      }
      #btnStart:disabled {
        background-color: #1a3c1c;
        color: #555;
        cursor: not-allowed;
      }

      #btnFinish {
        background-color: #1976d2;
        color: white;
      }
      #btnFinish:hover {
        background-color: #1565c0;
      }
      #btnFinish:disabled {
        background-color: #1c3654;
        color: #555;
        cursor: not-allowed;
      }

      #btnRestart {
        background-color: #f57c00;
        color: white;
        margin-top: 15px;
      }
      #btnRestart:hover {
        background-color: #e65100;
      }
      #btnRestart:disabled {
        background-color: #5c340a;
        color: #555;
        cursor: not-allowed;
      }

      /* Configuration Input */
      .config-input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        margin-top: 5px;
        background: #2a2a2a;
        color: white;
        border: 1px solid #444;
        border-radius: 3px;
        font-family: monospace;
        font-size: 14px;
      }
      .config-input:disabled {
        background: #1a1a1a;
        color: #555;
        cursor: not-allowed;
      }

      /* Labels */
      .radio-container {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .radio-container label {
        display: flex;
        align-items: center;
        cursor: pointer;
        font-size: 14px;
      }
      .radio-container input[type="radio"] {
        margin-right: 10px;
      }
      .color-box {
        width: 12px;
        height: 12px;
        display: inline-block;
        margin-right: 8px;
        border-radius: 2px;
      }
      .eraser-box {
        border: 1px solid #aaa;
        width: 10px;
        height: 10px;
        background: transparent;
      }

      /* Main Workspace */
      #workspace {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      /* Zoom & Pan Containers */
      #canvas-container {
        flex-grow: 1;
        position: relative;
        background-color: #000;
        overflow: hidden;
        cursor: grab;
      }
      #canvas-container:active {
        cursor: grabbing;
      }

      #zoom-wrapper {
        position: absolute;
        top: 0;
        left: 0;
        transform-origin: 0 0;
        width: 1046px;
        height: 952px;
      }

      /* Overlapping Canvases */
      canvas {
        position: absolute;
        top: 0;
        left: 0;
      }
      #bgCanvas {
        z-index: 1;
      }
      #fgCanvas {
        z-index: 2;
        pointer-events: auto;
      }

      /* Overlay to block interaction before starting */
      #overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        z-index: 10;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        color: white;
        text-align: center;
        flex-direction: column;
      }
      #overlay-subtext {
        font-size: 14px;
        color: #aaa;
        margin-top: 10px;
      }

      /* Slider and Navigation */
      #footer {
        height: 70px;
        background-color: #1e1e1e;
        border-top: 1px solid #333;
        display: flex;
        align-items: center;
        padding: 0 20px;
        z-index: 20;
      }
      .nav-btn {
        width: auto;
        padding: 10px 20px;
        margin: 0 10px;
        background-color: #333;
        color: white;
        border-radius: 4px;
        font-weight: bold;
        font-size: 14px;
        flex-shrink: 0;
      }
      .nav-btn:hover {
        background-color: #555;
      }
      .nav-btn:disabled {
        background-color: #1a1a1a;
        color: #444;
        cursor: not-allowed;
      }
      #sliceSlider {
        flex-grow: 1;
        margin: 0 10px;
        cursor: pointer;
      }
      #sliceLabel {
        font-family: monospace;
        font-size: 16px;
        width: 80px;
        text-align: right;
        flex-shrink: 0;
      }
      /* Floating 3D Reference Minimap */
      #minimap-container {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 100px;
        height: 100px;
        background: rgba(30, 30, 30, 0.7); /* Dark semi-transparent backdrop */
        border: 1px solid #444;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        perspective: 600px;
        z-index: 30; /* Keeps it above the canvas */
        pointer-events: none; /* Crucial: Lets users draw underneath it! */
      }

      #reference-cube {
        width: 60px;
        height: 60px;
        position: relative;
        transform-style: preserve-3d;
        transform: rotateX(-20deg) rotateY(-45deg);
      }

      .cube-face {
        position: absolute;
        width: 60px;
        height: 60px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.02);
      }

      .front {
        transform: translateZ(30px);
        border-color: rgba(255, 255, 255, 0.6);
      }
      .back {
        transform: translateZ(-30px);
      }
      .left {
        transform: rotateY(-90deg) translateZ(30px);
      }
      .right {
        transform: rotateY(90deg) translateZ(30px);
      }
      .top {
        transform: rotateX(90deg) translateZ(30px);
      }
      .bottom {
        transform: rotateX(-90deg) translateZ(30px);
      }

      #moving-slice {
        position: absolute;
        width: 60px;
        height: 60px;
        background: rgba(51, 153, 255, 0.6);
        border: 1px solid #3399ff;
        box-shadow: 0 0 10px rgba(51, 153, 255, 0.5);
        transform: translateZ(-30px);
        transition: transform 0.1s linear;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <h2>Dataset Config</h2>
      <div class="control-group">
        <label for="inputTotalSlices" style="font-size: 12px; color: #ccc"
          >Amount of Slices:</label
        >
        <input
          type="number"
          id="inputTotalSlices"
          class="config-input"
          value="100"
          min="1"
          max="5000"
        />
      </div>
      <h2>Rendering Options</h2>
      <div class="control-group">
        <label for="inputShineDepth" style="font-size: 12px; color: #ccc"
          >Shine-Through Depth (Slices):</label
        >
        <input
          type="number"
          id="inputShineDepth"
          class="config-input"
          value="3"
          min="0"
          max="15"
        />
      </div>

      <h2>Task Controls</h2>
      <div class="control-group">
        <button id="btnStart" disabled>LOADING IMAGES...</button>
        <button id="btnFinish" disabled>FINISH & EXPORT</button>
        <button id="btnRestart" disabled>RESTART TASK</button>
      </div>

      <h2>Structure Labels</h2>
      <div class="control-group radio-container">
        <label
          ><input type="radio" name="labelGroup" value="#ff3333" checked />
          <span class="color-box" style="background: #ff3333"></span>
          Cluster</label
        >
        <label
          ><input type="radio" name="labelGroup" value="#3399ff" />
          <span class="color-box" style="background: #3399ff"></span>
          Filament</label
        >
        <label
          ><input type="radio" name="labelGroup" value="#33cc33" />
          <span class="color-box" style="background: #33cc33"></span>
          Void</label
        >
        <label
          ><input type="radio" name="labelGroup" value="eraser" />
          <span class="color-box eraser-box"></span> Eraser</label
        >
      </div>

      <h2>Brush Size</h2>
      <div class="control-group">
        <input
          type="range"
          id="brushSize"
          min="1"
          max="50"
          value="10"
          style="width: 100%"
        />
        <p style="font-size: 11px; color: #888; margin-top: 10px">
          <b>Scroll:</b> Zoom In/Out<br /><b>Mid-Click / Alt+Click:</b> Pan
        </p>
      </div>
    </div>

    <div id="workspace">
      <div id="overlay">
        <div id="overlay-text">Loading Dataset...</div>
        <div id="overlay-subtext">
          Please wait while images are cached to memory.
        </div>
      </div>

      <div id="canvas-container">
        <div id="zoom-wrapper">
          <canvas id="bgCanvas" width="1046" height="952"></canvas>
          <canvas id="fgCanvas" width="1046" height="952"></canvas>
        </div>

        <div id="minimap-container">
          <div id="reference-cube">
            <div class="cube-face front"></div>
            <div class="cube-face back"></div>
            <div class="cube-face left"></div>
            <div class="cube-face right"></div>
            <div class="cube-face top"></div>
            <div class="cube-face bottom"></div>
            <div id="moving-slice"></div>
          </div>
        </div>
      </div>

      <div id="footer">
        <button id="btnPrevSlice" class="nav-btn" disabled>&#9664; PREV</button>
        <input
          type="range"
          id="sliceSlider"
          min="0"
          max="99"
          value="0"
          disabled
        />
        <button id="btnNextSlice" class="nav-btn" disabled>NEXT &#9654;</button>
        <div id="sliceLabel">Z: 000</div>
      </div>
    </div>

    <script>
      // --- 1. State Variables ---
      let taskActive = false;
      let startTime = 0;
      let currentSlice = 0;
      let totalSlices = 100;
      let annotationCache = []; // NEW: Array of offscreen canvases
      let imageCache = [];
      let imagesLoaded = 0;
      let blankCanvasData = "";

      // Zoom & Pan Variables
      let zoomScale = 1;
      let panX = 0;
      let panY = 0;
      let isPanning = false;

      // Configuration for image loading
      const imageFolder = "slices/";
      const imagePrefix = "slice_";
      const imageExtension = ".png";
      const zeroPadLength = 3;

      // DOM Elements
      const container = document.getElementById("canvas-container");
      const zoomWrapper = document.getElementById("zoom-wrapper");
      const bgCanvas = document.getElementById("bgCanvas");
      const fgCanvas = document.getElementById("fgCanvas");
      const bgCtx = bgCanvas.getContext("2d", { willReadFrequently: true });
      const fgCtx = fgCanvas.getContext("2d", { willReadFrequently: true });

      const sliceSlider = document.getElementById("sliceSlider");
      const sliceLabel = document.getElementById("sliceLabel");
      const btnPrevSlice = document.getElementById("btnPrevSlice");
      const btnNextSlice = document.getElementById("btnNextSlice");
      const movingSlice = document.getElementById("moving-slice");

      const btnStart = document.getElementById("btnStart");
      const btnFinish = document.getElementById("btnFinish");
      const btnRestart = document.getElementById("btnRestart");
      const overlay = document.getElementById("overlay");
      const overlayText = document.getElementById("overlay-text");
      const overlaySubtext = document.getElementById("overlay-subtext");
      const inputTotalSlices = document.getElementById("inputTotalSlices");
      const inputShineDepth = document.getElementById("inputShineDepth");
      const brushSizeInput = document.getElementById("brushSize");
      const radioInputs = document.querySelectorAll('input[name="labelGroup"]');

      // --- 2. Zoom & Pan Logic ---
      function applyTransform() {
        zoomWrapper.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomScale})`;
        updateCursor();
      }

      function centerCanvas() {
        const rect = container.getBoundingClientRect();
        const scaleX = rect.width / bgCanvas.width;
        const scaleY = rect.height / bgCanvas.height;
        zoomScale = Math.min(scaleX, scaleY) * 0.95;
        panX = (rect.width - bgCanvas.width * zoomScale) / 2;
        panY = (rect.height - bgCanvas.height * zoomScale) / 2;
        applyTransform();
      }

      container.addEventListener("wheel", (e) => {
        if (!taskActive && !overlay.style.display === "none") return;
        e.preventDefault();
        const zoomSensitivity = 0.0015;
        const delta = e.deltaY * -zoomSensitivity;
        const newScale = Math.min(Math.max(0.1, zoomScale + delta), 20);

        const rect = container.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        panX = mouseX - (mouseX - panX) * (newScale / zoomScale);
        panY = mouseY - (mouseY - panY) * (newScale / zoomScale);
        zoomScale = newScale;
        applyTransform();
      });

      container.addEventListener("mousedown", (e) => {
        if (e.button === 1 || (e.button === 0 && e.altKey)) {
          e.preventDefault();
          isPanning = true;
          container.style.cursor = "grabbing";
          container.dataset.startX = e.clientX - panX;
          container.dataset.startY = e.clientY - panY;
        }
      });

      window.addEventListener("mousemove", (e) => {
        if (isPanning) {
          panX = e.clientX - parseFloat(container.dataset.startX);
          panY = e.clientY - parseFloat(container.dataset.startY);
          applyTransform();
        }
      });

      window.addEventListener("mouseup", () => {
        if (isPanning) {
          isPanning = false;
          container.style.cursor = "grab";
        }
      });

      window.addEventListener("resize", () => {
        if (!isPanning && zoomScale < 1) centerCanvas();
      });

      // --- 3. Dynamic SVG Brush Cursor ---
      function updateCursor() {
        const size = parseFloat(brushSizeInput.value);
        const selectedTool = document.querySelector(
          'input[name="labelGroup"]:checked',
        ).value;
        const visualSize = Math.max(2, size * zoomScale);
        const radius = visualSize / 2;

        let svg = "";
        if (selectedTool === "eraser") {
          svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${visualSize}" height="${visualSize}" viewBox="0 0 ${visualSize} ${visualSize}">
            <circle cx="${radius}" cy="${radius}" r="${radius - 1}" fill="none" stroke="white" stroke-width="2" stroke-dasharray="4,4"/>
          </svg>`;
        } else {
          svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${visualSize}" height="${visualSize}" viewBox="0 0 ${visualSize} ${visualSize}">
            <circle cx="${radius}" cy="${radius}" r="${radius - 0.5}" fill="${selectedTool}" fill-opacity="0.4" stroke="white" stroke-width="1.5" stroke-opacity="0.8"/>
          </svg>`;
        }

        const encoded = encodeURIComponent(svg)
          .replace(/'/g, "%27")
          .replace(/"/g, "%22");
        fgCanvas.style.cursor = `url("data:image/svg+xml;charset=utf-8,${encoded}") ${radius} ${radius}, crosshair`;
      }

      brushSizeInput.addEventListener("input", updateCursor);
      radioInputs.forEach((el) => el.addEventListener("change", updateCursor));

      // --- 4. Image Preloader Engine ---
      function preloadImages() {
        imagesLoaded = 0;
        imageCache = new Array(totalSlices);
        btnStart.innerText = "LOADING IMAGES...";
        btnStart.disabled = true;
        overlayText.innerText = "Loading Dataset...";

        for (let i = 0; i < totalSlices; i++) {
          let img = new Image();
          let paddedIndex = i.toString().padStart(zeroPadLength, "0");
          img.src = `${imageFolder}${imagePrefix}${paddedIndex}${imageExtension}`;

          img.onload = () => {
            imagesLoaded++;
            overlaySubtext.innerText = `Cached ${imagesLoaded} of ${totalSlices} slices...`;
            if (i === currentSlice) renderBackground(currentSlice);

            if (imagesLoaded === totalSlices) {
              btnStart.innerText = "START TASK";
              btnStart.disabled = false;
              overlayText.innerText = 'Click "START TASK" to begin';
              overlaySubtext.innerHTML =
                "Timer will start immediately.<br>Use Left/Right Arrow keys to navigate slices quickly.";
              centerCanvas();
            }
          };
          img.onerror = () => {
            console.error(`Failed to load image: ${img.src}`);
            imagesLoaded++;
          };
          imageCache[i] = img;
        }
      }

      // --- 5. Master Reset Function ---
      function resetTask() {
        taskActive = false;
        totalSlices = parseInt(inputTotalSlices.value) || 100;
        if (totalSlices < 1) totalSlices = 1;

        // NEW: Generate an array of invisible memory canvases for instant saving/loading
        annotationCache = [];
        for (let i = 0; i < totalSlices; i++) {
          let c = document.createElement("canvas");
          c.width = fgCanvas.width;
          c.height = fgCanvas.height;
          annotationCache.push(c);
        }

        currentSlice = 0;
        sliceSlider.max = totalSlices - 1;
        sliceSlider.value = 0;
        sliceSlider.disabled = true;
        sliceLabel.innerText = "Z: 000";

        inputTotalSlices.disabled = false;
        btnFinish.disabled = true;
        btnRestart.disabled = true;
        btnPrevSlice.disabled = true;
        btnNextSlice.disabled = true;

        fgCtx.clearRect(0, 0, fgCanvas.width, fgCanvas.height);
        blankCanvasData = fgCanvas.toDataURL(); // Takes a fingerprint of a blank canvas
        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

        overlaySubtext.style.display = "block";
        overlay.style.display = "flex";

        updateCursor();
        preloadImages();
      }

      inputTotalSlices.addEventListener("change", resetTask);

      // --- 6. Drawing Logic ---
      let isDrawing = false;
      fgCtx.lineCap = "round";
      fgCtx.lineJoin = "round";

      function applyStrokeProperties() {
        const selectedTool = document.querySelector(
          'input[name="labelGroup"]:checked',
        ).value;
        if (selectedTool === "eraser") {
          fgCtx.globalCompositeOperation = "destination-out";
          fgCtx.strokeStyle = "rgba(0,0,0,1)";
        } else {
          fgCtx.globalCompositeOperation = "source-over";
          fgCtx.strokeStyle = selectedTool;
        }
        fgCtx.lineWidth = document.getElementById("brushSize").value;
      }

      fgCanvas.addEventListener("mousedown", (e) => {
        if (!taskActive || e.button !== 0 || e.altKey || isPanning) return;
        isDrawing = true;
        fgCtx.beginPath();
        fgCtx.moveTo(e.offsetX, e.offsetY);
        applyStrokeProperties();
        fgCtx.lineTo(e.offsetX, e.offsetY);
        fgCtx.stroke();
      });

      fgCanvas.addEventListener("mousemove", (e) => {
        if (!isDrawing || !taskActive) return;
        applyStrokeProperties();
        fgCtx.lineTo(e.offsetX, e.offsetY);
        fgCtx.stroke();
      });

      window.addEventListener("mouseup", () => {
        isDrawing = false;
      });
      fgCanvas.addEventListener("mouseout", () => {
        isDrawing = false;
      });

      // --- 7. Real Background Renderer (WITH ANNOTATION SHINE-THROUGH) ---
      inputShineDepth.addEventListener("input", () => {
        if (taskActive) renderBackground(currentSlice);
      });

      function renderBackground(sliceIndex) {
        bgCtx.globalCompositeOperation = "source-over";
        bgCtx.globalAlpha = 1.0;
        bgCtx.fillStyle = "#0a0a0a";
        bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

        const depth = parseInt(inputShineDepth.value) || 0;
        bgCtx.globalCompositeOperation = "screen"; // Additive blending for all layers

        // Draw the Shine Through slices AND their corresponding annotations
        for (let i = depth; i >= 1; i--) {
          let lowerSliceIdx = sliceIndex - i;

          if (lowerSliceIdx >= 0) {
            bgCtx.globalAlpha = 1 - i / (depth + 1); // Dynamic fading

            // Draw background image
            const lowerImg = imageCache[lowerSliceIdx];
            if (lowerImg && lowerImg.complete && lowerImg.naturalHeight !== 0) {
              bgCtx.drawImage(lowerImg, 0, 0, bgCanvas.width, bgCanvas.height);
            }

            // Draw the lower annotation from the memory cache!
            if (annotationCache[lowerSliceIdx]) {
              bgCtx.drawImage(
                annotationCache[lowerSliceIdx],
                0,
                0,
                bgCanvas.width,
                bgCanvas.height,
              );
            }
          }
        }

        // Draw the current active slice image at 100% opacity
        bgCtx.globalAlpha = 1.0;
        const currentImg = imageCache[sliceIndex];

        if (
          currentImg &&
          currentImg.complete &&
          currentImg.naturalHeight !== 0
        ) {
          bgCtx.drawImage(currentImg, 0, 0, bgCanvas.width, bgCanvas.height);
        } else {
          bgCtx.globalCompositeOperation = "source-over";
          bgCtx.fillStyle = "#555";
          bgCtx.font = "20px monospace";
          bgCtx.fillText(`Image ${sliceIndex} not found or loading...`, 20, 40);
        }
        bgCtx.globalCompositeOperation = "source-over";
      }

      // --- 8. Slice Navigation & State Saving ---
      function changeSlice(newSlice) {
        // 1. Instantly save the current foreground drawing to the memory cache
        let cacheCtx = annotationCache[currentSlice].getContext("2d");
        cacheCtx.clearRect(0, 0, fgCanvas.width, fgCanvas.height);
        cacheCtx.drawImage(fgCanvas, 0, 0);

        // 2. Update UI values
        currentSlice = parseInt(newSlice);
        sliceLabel.innerText = `Z: ${currentSlice.toString().padStart(zeroPadLength, "0")}`;

        if (totalSlices > 1 && movingSlice) {
          const percentage = currentSlice / (totalSlices - 1);
          const zPosition = -30 + percentage * 60;
          movingSlice.style.transform = `translateZ(${zPosition}px)`;
        }

        // 3. Render the background (which now composites the cached annotations too)
        renderBackground(currentSlice);

        // 4. Instantly restore the specific drawing for this new slice to the foreground
        fgCtx.clearRect(0, 0, fgCanvas.width, fgCanvas.height);
        fgCtx.drawImage(annotationCache[currentSlice], 0, 0);
      }

      function stepSlice(direction) {
        if (!taskActive) return;
        let targetSlice = currentSlice + direction;
        if (targetSlice >= 0 && targetSlice < totalSlices) {
          sliceSlider.value = targetSlice;
          changeSlice(targetSlice);
        }
      }

      sliceSlider.addEventListener("input", (e) => {
        changeSlice(e.target.value);
      });
      btnPrevSlice.addEventListener("click", () => stepSlice(-1));
      btnNextSlice.addEventListener("click", () => stepSlice(1));

      document.addEventListener("keydown", (e) => {
        if (!taskActive) return;
        if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A")
          stepSlice(-1);
        else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D")
          stepSlice(1);
      });

      // --- 9. Task Control Button Listeners ---
      btnStart.addEventListener("click", () => {
        taskActive = true;
        startTime = Date.now();
        overlay.style.display = "none";

        inputTotalSlices.disabled = true;
        btnStart.disabled = true;
        btnFinish.disabled = false;
        btnRestart.disabled = false;
        sliceSlider.disabled = false;
        btnPrevSlice.disabled = false;
        btnNextSlice.disabled = false;
      });

      btnFinish.addEventListener("click", () => {
        if (!taskActive) return;
        taskActive = false;
        let endTime = Date.now();
        let timeOnTaskSeconds = ((endTime - startTime) / 1000).toFixed(2);

        // Save the current slice one last time before export
        let cacheCtx = annotationCache[currentSlice].getContext("2d");
        cacheCtx.clearRect(0, 0, fgCanvas.width, fgCanvas.height);
        cacheCtx.drawImage(fgCanvas, 0, 0);

        exportData(timeOnTaskSeconds);
      });

      btnRestart.addEventListener("click", () => {
        if (
          confirm(
            "Are you sure you want to restart? All drawings and timers will be permanently deleted.",
          )
        ) {
          resetTask();
        }
      });

      // --- 10. Data Export (BLOB VERSION) ---
      function exportData(timeSeconds) {
        let populatedSlices = {};

        // Process the memory cache into base64 strings only at the very end
        annotationCache.forEach((cacheCanvas, index) => {
          const dataURL = cacheCanvas.toDataURL();
          if (dataURL && dataURL !== blankCanvasData) {
            populatedSlices[`slice_${index}`] = dataURL;
          }
        });

        const drawnSliceCount = Object.keys(populatedSlices).length;
        const exportPayload = {
          experiment_metadata: {
            condition: "2D_Desktop",
            time_on_task_seconds: parseFloat(timeSeconds),
            total_slices_viewed: totalSlices,
            annotated_slice_count: drawnSliceCount,
            timestamp: new Date().toISOString(),
          },
          annotations: populatedSlices,
        };

        const jsonString = JSON.stringify(exportPayload, null, 2);
        const blob = new Blob([jsonString], { type: "application/json" });
        const blobUrl = URL.createObjectURL(blob);

        const downloadAnchorNode = document.createElement("a");
        downloadAnchorNode.setAttribute("href", blobUrl);
        downloadAnchorNode.setAttribute(
          "download",
          `participant_2D_export_${Date.now()}.json`,
        );
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();

        URL.revokeObjectURL(blobUrl);

        overlayText.innerText = `Task Complete! Time: ${timeSeconds}s\nSaved ${drawnSliceCount} annotated slices.`;
        overlaySubtext.style.display = "none";
        overlay.style.display = "flex";

        sliceSlider.disabled = true;
        btnPrevSlice.disabled = true;
        btnNextSlice.disabled = true;
        btnFinish.disabled = true;
      }

      resetTask();
    </script>
  </body>
</html>
